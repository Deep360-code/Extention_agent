<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agentic AI</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <span class="icon">🤖</span>
                <h1>Agentic AI</h1>
            </div>
            <div class="controls">
                <button id="clear-memory" title="Clear Memory">🗑️</button>
            </div>
        </header>

        <div class="mode-selector">
            <select id="agent-mode">
                <option value="Research Assistant">Research Assistant</option>
                <option value="Job Analyzer">Job Analyzer</option>
                <option value="Content Simplifier">Content Simplifier</option>
                <option value="Learning Mode">Learning Mode</option>
                <option value="Autonomous Planner">Autonomous Planner</option>
            </select>
        </div>

        <div class="chat-container" id="chat-history">
            <!-- Messages will appear here -->
            <div class="message ai-message">
                Hello! I'm your Agentic AI assistant. How can I help you with this page?
            </div>
        </div>

        <div class="input-area">
            <textarea id="user-input" placeholder="Ask something... (Cmd+Enter to send)"></textarea>
            <button id="send-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </div>
    </div>
    <script src="popup.js"></script>
</body>
</html>
